name: CPU build and test

on:
  pull_request:
  push:
    branches:
      - master

permissions:
  contents: read

jobs:
  cpu:
    name: ${{ matrix.job_name }}
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - job_name: CPU
            python_version: "3.12.13"
            pytorch_version: "2.13.0+cpu"
            mismatch_pytorch_version: "2.12.0+cpu"
            artifact_name: torch-cuda-api-gaps
          - job_name: CPU (Python 3.10, PyTorch 2.12)
            python_version: "3.10.18"
            pytorch_version: "2.12.0+cpu"
            mismatch_pytorch_version: "2.13.0+cpu"
            artifact_name: torch-cuda-api-gaps-python-3.10-pytorch-2.12
          - job_name: CPU (Python 3.10, PyTorch 2.13)
            python_version: "3.10.18"
            pytorch_version: "2.13.0+cpu"
            mismatch_pytorch_version: ""
            artifact_name: torch-cuda-api-gaps-python-3.10-pytorch-2.13
          - job_name: CPU (Python 3.11, PyTorch 2.12)
            python_version: "3.11.13"
            pytorch_version: "2.12.0+cpu"
            mismatch_pytorch_version: ""
            artifact_name: torch-cuda-api-gaps-python-3.11-pytorch-2.12
          - job_name: CPU (Python 3.11, PyTorch 2.13)
            python_version: "3.11.13"
            pytorch_version: "2.13.0+cpu"
            mismatch_pytorch_version: ""
            artifact_name: torch-cuda-api-gaps-python-3.11-pytorch-2.13
          - job_name: CPU (Python 3.12, PyTorch 2.12)
            python_version: "3.12.13"
            pytorch_version: "2.12.0+cpu"
            mismatch_pytorch_version: ""
            artifact_name: torch-cuda-api-gaps-python-3.12-pytorch-2.12
    env:
      INFINIRT_COMMIT: 95c70080f9551e61241110497d163dfcdf9dc7e7
      INFINIOPS_COMMIT: 296271487beb594a248fd463e5fff14f7ab74293
      PIP_DISABLE_PIP_VERSION_CHECK: "1"
      PYTORCH_VERSION: ${{ matrix.pytorch_version }}
    steps:
      - name: Check out torch-infini
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ matrix.python_version }}
      - name: Install pinned build and test tools
        run: |
          python -m pip install --upgrade pip==25.1.1
          python -m pip install \
            cmake==4.0.3 \
            ninja==1.11.1.4 \
            numpy==2.2.6 \
            pytest==8.4.1 \
            pyyaml==6.0.2 \
            setuptools==80.9.0 \
            "tomli==2.2.1; python_version < '3.11'" \
            wheel==0.45.1
          python -m pip install \
            --index-url https://download.pytorch.org/whl/cpu \
            "torch==$PYTORCH_VERSION"
      - name: Fetch pinned InfiniRT source
        run: |
          git init "$RUNNER_TEMP/InfiniRT"
          git -C "$RUNNER_TEMP/InfiniRT" remote add origin \
            https://github.com/InfiniTensor/InfiniRT.git
          git -C "$RUNNER_TEMP/InfiniRT" fetch --depth=1 origin \
            "$INFINIRT_COMMIT"
          git -C "$RUNNER_TEMP/InfiniRT" checkout --detach FETCH_HEAD
          test "$(git -C "$RUNNER_TEMP/InfiniRT" rev-parse HEAD)" = \
            "$INFINIRT_COMMIT"
      - name: Build CPU-only InfiniRT
        env:
          INFINI_RT_PREFIX: ${{ runner.temp }}/infinirt-install
        run: |
          cmake \
            -S "$RUNNER_TEMP/InfiniRT" \
            -B "$RUNNER_TEMP/InfiniRT/build" \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX="$INFINI_RT_PREFIX" \
            -DAUTO_DETECT_DEVICES=OFF \
            -DINFINI_RT_BUILD_TESTING=OFF \
            -DWITH_CPU=ON
          cmake --build "$RUNNER_TEMP/InfiniRT/build" --parallel 2
          cmake --install "$RUNNER_TEMP/InfiniRT/build"
      - name: Fetch pinned InfiniOps source
        run: |
          git init "$RUNNER_TEMP/InfiniOps"
          git -C "$RUNNER_TEMP/InfiniOps" remote add origin \
            https://github.com/InfiniTensor/InfiniOps.git
          git -C "$RUNNER_TEMP/InfiniOps" fetch --depth=1 origin \
            "$INFINIOPS_COMMIT"
          git -C "$RUNNER_TEMP/InfiniOps" checkout --detach FETCH_HEAD
          test "$(git -C "$RUNNER_TEMP/InfiniOps" rev-parse HEAD)" = \
            "$INFINIOPS_COMMIT"
      - name: Build CPU-only InfiniOps
        env:
          INFINI_OPS_PREFIX: ${{ runner.temp }}/infiniops-install
          INFINI_RT_PREFIX: ${{ runner.temp }}/infinirt-install
        run: |
          cmake \
            -S "$RUNNER_TEMP/InfiniOps" \
            -B "$RUNNER_TEMP/InfiniOps/build" \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX="$INFINI_OPS_PREFIX" \
            -DINFINI_RT_ROOT="$INFINI_RT_PREFIX" \
            -DWITH_CPU=ON \
            -DWITH_TORCH=OFF \
            -DGENERATE_OPERATOR_CALL_INSTANTIATIONS=ON \
            -DINFINI_OPS_OPS=add
          cmake --build "$RUNNER_TEMP/InfiniOps/build" \
            --target infiniops \
            --parallel 2
          cmake --install "$RUNNER_TEMP/InfiniOps/build"
      - name: Build torch-infini wheel
        env:
          INFINI_OPS_PREFIX: ${{ runner.temp }}/infiniops-install
          INFINI_RT_PREFIX: ${{ runner.temp }}/infinirt-install
        run: >-
          python -m pip wheel .
          --wheel-dir "$RUNNER_TEMP/wheelhouse"
          --no-build-isolation
          --no-deps
      - name: Install torch-infini wheel outside the source tree
        working-directory: ${{ runner.temp }}
        run: >-
          python -m pip install
          --no-deps
          "$RUNNER_TEMP"/wheelhouse/*.whl
      - name: Verify automatic CPU fallback
        working-directory: ${{ runner.temp }}
        env:
          LD_LIBRARY_PATH: ${{ runner.temp }}/infiniops-install/lib:${{ runner.temp }}/infinirt-install/lib
        run: |
          python - <<'PY'
          import torch
          import torch_infini
          from torch_infini import _build_info

          assert _build_info.BUILD_TORCH_VERSION == torch.__version__
          assert _build_info.BUILD_TORCH_MAJOR_MINOR == ".".join(
              torch.__version__.split(".")[:2]
          )
          assert torch_infini._C._runtime_backend_name() == "cpu"
          assert torch.infini.is_available()
          assert torch.infini.device_count() > 0
          assert not hasattr(torch.infini, "init")

          source = torch.arange(16, dtype=torch.float32).reshape(4, 4)
          device = torch.empty_like(source, device="infini")
          device.copy_(source)
          result = torch.empty_like(source)
          result.copy_(device)
          torch.testing.assert_close(result, source)
          PY
      - name: Run test suite outside the source tree
        working-directory: ${{ runner.temp }}
        env:
          INFINI_OPS_PREFIX: ${{ runner.temp }}/infiniops-install
          INFINI_RT_PREFIX: ${{ runner.temp }}/infinirt-install
          LD_LIBRARY_PATH: ${{ runner.temp }}/infiniops-install/lib:${{ runner.temp }}/infinirt-install/lib
          TORCH_INFINI_TEST_EXPECTED_BACKEND: cpu
        run: python -m pytest -q "$GITHUB_WORKSPACE/tests"
      - name: Generate torch.cuda API gap report
        working-directory: ${{ runner.temp }}
        env:
          LD_LIBRARY_PATH: ${{ runner.temp }}/infiniops-install/lib:${{ runner.temp }}/infinirt-install/lib
        run: |
          python "$GITHUB_WORKSPACE/tools/report_api_gaps.py" \
            --profile "$GITHUB_WORKSPACE/tests/conformance/api_profile.json" \
            --markdown "$RUNNER_TEMP/conformance/torch-cuda-gaps.md" \
            --json "$RUNNER_TEMP/conformance/torch-cuda-gaps.json"
      - name: Upload torch.cuda API gap report
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ runner.temp }}/conformance
          if-no-files-found: error
      - name: Install mismatched PyTorch
        if: matrix.mismatch_pytorch_version != ''
        env:
          MISMATCH_PYTORCH_VERSION: ${{ matrix.mismatch_pytorch_version }}
        run: >-
          python -m pip install
          --force-reinstall
          --no-deps
          --index-url https://download.pytorch.org/whl/cpu
          "torch==$MISMATCH_PYTORCH_VERSION"
      - name: Verify PyTorch minor mismatch is rejected
        if: matrix.mismatch_pytorch_version != ''
        working-directory: ${{ runner.temp }}
        env:
          BUILD_PYTORCH_VERSION: ${{ matrix.pytorch_version }}
        run: |
          python - <<'PY'
          import os

          import torch


          def major_minor(version):
              return ".".join(version.split("+")[0].split(".")[:2])


          build_version = os.environ["BUILD_PYTORCH_VERSION"]
          try:
              import torch_infini  # noqa: F401
          except ImportError as exc:
              message = str(exc)
          else:
              raise AssertionError("torch_infini accepted a cross-minor PyTorch")

          assert f"built against PyTorch {build_version}" in message
          assert f"major.minor {major_minor(build_version)}" in message
          assert f"installed PyTorch is {torch.__version__}" in message
          assert f"major.minor {major_minor(torch.__version__)}" in message
          assert torch._C._get_privateuse1_backend_name() == "privateuseone"
          PY
